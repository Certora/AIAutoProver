# docker-compose.yml — AI Autoprover containerized execution
#
# Bring up the persistent postgres:
#   docker compose -f scripts/docker-compose.yml up -d postgres
#
# One-time DB schema + RAG/KB population (requires ANTHROPIC_API_KEY in env):
#   docker compose -f scripts/docker-compose.yml --profile autoprove \
#       run --rm autoprove setup-db
#
# Run autoprove ephemerally (the container is `--rm`'d on exit; postgres
# keeps state in the `postgres_data` volume across container drops):
#   export HOST_UID=$(id -u) HOST_GID=$(id -g)
#   export HOST_WORK_DIR=/path/to/your/project   # defaults to $PWD
#   docker compose -f scripts/docker-compose.yml --profile autoprove \
#       run --rm autoprove console-autoprove --cloud \
#       /work/<project> /work/<project>/src/X.sol:X /work/<project>/docs/...
name: autoprover

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_admin_password
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    command: |
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
      -c max_connections=50
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  autoprove:
    profiles: ["autoprove"]
    image: aiautoprover:latest
    build:
      context: ..
      dockerfile: scripts/Dockerfile.autoprove
      ssh:
        - default
    depends_on:
      postgres:
        condition: service_healthy
    # Run as the host user so /work outputs aren't owned by root. Docker
    # bind mounts pass UIDs through directly. HOST_UID/HOST_GID default to
    # 1000:1000; override with: export HOST_UID=$(id -u) HOST_GID=$(id -g)
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY must be set in your shell}
      CERTORAKEY: ${CERTORAKEY:-}
      CERTORA_AI_COMPOSER_PGHOST: postgres
      CERTORA_AI_COMPOSER_PGPORT: "5432"
    volumes:
      # Mount the host directory containing your Solidity project(s) and
      # system docs into /work. Defaults to $PWD when compose was invoked.
      - ${HOST_WORK_DIR:-${PWD}}:/work
    working_dir: /work

volumes:
  postgres_data:
